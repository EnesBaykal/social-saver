name: social_downloader
description: TikTok, YouTube, Instagram, Facebook video indirme uygulaması
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP Client
  dio: ^5.7.0

  # Navigation
  go_router: ^14.2.7

  # Storage & Permissions
  path_provider: ^2.1.4
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.2

  # Medya galeriye kaydetme
  image_gallery_saver: ^2.0.3

  # Ağ görselleri önbelleği
  cached_network_image: ^3.4.1

  # Tarih formatı
  intl: ^0.19.0

  # Share intent (diğer uygulamalardan URL almak için)
  receive_sharing_intent: ^1.8.0

  # Bildirimler
  flutter_local_notifications: ^17.2.3

  # Dosya seçici (cookie.txt yüklemek için)
  file_picker: ^8.1.2

  # İkonlar
  flutter_svg: ^2.0.10+1
  iconsax: ^0.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
  assets:
    - assets/images/
